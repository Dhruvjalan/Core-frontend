name: Deploy Core Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        env:
            VITE_DEV_BACKEND_URL: ${{ secrets.VITE_DEV_BACKEND_URL }}
            VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
            VITE_PRODUCTION: ${{ secrets.VITE_PRODUCTION }}
        run: npm run build

      # NEW STEP: Prep the EC2 folder by running your refresh commands
      - name: Prepare Target Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/core-frontend
            sudo mkdir -p /var/www/html/core-frontend
            sudo chown ubuntu:ubuntu /var/www/html/core-frontend
            sudo chmod 755 /var/www/html/core-frontend

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/html/core-frontend"
          strip_components: 1

      - name: Finalize Permissions & Health Check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Set to www-data for Nginx, but keep 755 so ubuntu can still enter
            sudo chown -R www-data:www-data /var/www/html/core-frontend
            sudo chmod -R 755 /var/www/html/core-frontend
            
            if [ -f "/var/www/html/core-frontend/index.html" ]; then
              echo "Deployment successful: index.html is in place."
            else
              echo "Deployment failed: index.html not found."
              exit 1
            fi

      - name: Run Backend Smoke Test
        env: 
            VITE_PROD_BACKEND_URL: ${{ secrets.VITE_PROD_BACKEND_URL }}
            TEST_ROLL_NO: "ed24b047"
        run: |
          chmod +x smoke-test.sh
          ./smoke-test.sh